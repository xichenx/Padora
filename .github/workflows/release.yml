# Build Padora for Windows / macOS / Linux and publish installable artifacts
# to a GitHub Release.
#
# How to release:
#   1. Bump version in src-tauri/tauri.conf.json (and package.json).
#   2. Commit and push to main.
#   3. Create and push a tag, e.g.  git tag v0.1.0 && git push origin v0.1.0
#      — or run this workflow manually from the Actions tab (workflow_dispatch).
#   4. Open the draft Release on GitHub, verify assets, then click "Publish release".
#
# Repo settings (required once):
#   Settings → Actions → General → Workflow permissions → Read and write permissions

name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: Padora v__VERSION__
          releaseBody: |
            ## Padora v__VERSION__

            Cross-platform Markdown editor (Typora-like).

            | Platform | File |
            | --- | --- |
            | Windows | `.msi` / `.exe` (NSIS) |
            | macOS (Apple Silicon) | `.dmg` (aarch64) |
            | macOS (Intel) | `.dmg` (x86_64) |
            | Linux | `.deb`, `.AppImage` |

            Download the installer for your system from the assets below.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
