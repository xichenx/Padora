# Build Padora for Windows / macOS / Linux and publish installable artifacts
# to a GitHub Release.
#
# Version is determined as follows:
#   • Push tag v*     → version from the tag (e.g. v0.2.0 → 0.2.0)
#   • Manual run      → version from the "Release version" input field
#
# Repo settings (required once):
#   Settings → Actions → General → Workflow permissions → Read and write permissions
#
# Windows code signing (optional, removes SmartScreen "unsafe" warning):
#   1. Buy a Code Signing .pfx certificate
#   2. Secrets: WINDOWS_CERTIFICATE, WINDOWS_CERTIFICATE_PASSWORD, WINDOWS_CERTIFICATE_THUMBPRINT
#   3. Variable: ENABLE_WINDOWS_SIGNING = true
#   See docs/windows-code-signing.zh-CN.md

name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (semver, without v prefix, e.g. 0.2.0)"
        required: true
        type: string
  push:
    tags:
      - "v*"

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set.outputs.version }}
      tag: ${{ steps.set.outputs.tag }}
    steps:
      - name: Resolve release version
        id: set
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            # refs/tags/v0.2.0 → 0.2.0
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi

          # Trim whitespace and strip a leading "v" if present.
          VERSION="$(echo "$VERSION" | tr -d '[:space:]')"
          VERSION="${VERSION#v}"

          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'; then
            echo "::error::Invalid version: $VERSION (expected semver like 0.2.0)"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Release version: $VERSION (tag: v$VERSION)"

  publish:
    needs: resolve-version
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Apply release version to project files
        shell: bash
        run: |
          VERSION="${{ needs.resolve-version.outputs.version }}"
          jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json > tauri.conf.tmp
          mv tauri.conf.tmp src-tauri/tauri.conf.json
          jq --arg v "$VERSION" '.version = $v' package.json > package.tmp
          mv package.tmp package.json
          echo "Building Padora v$VERSION"

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # Optional: set repo variable ENABLE_WINDOWS_SIGNING=true and add secrets
      # WINDOWS_CERTIFICATE, WINDOWS_CERTIFICATE_PASSWORD, WINDOWS_CERTIFICATE_THUMBPRINT
      - name: Import Windows code signing certificate
        if: matrix.platform == 'windows-latest' && vars.ENABLE_WINDOWS_SIGNING == 'true'
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          New-Item -ItemType Directory -Force -Path certificate | Out-Null
          Set-Content -Path certificate/tempCert.txt -Value $env:WINDOWS_CERTIFICATE
          certutil -decode certificate/tempCert.txt certificate/certificate.pfx
          Remove-Item certificate/tempCert.txt
          Import-PfxCertificate -FilePath certificate/certificate.pfx `
            -CertStoreLocation Cert:\CurrentUser\My `
            -Password (ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -Force -AsPlainText)

      - name: Configure Windows signing in Tauri
        if: matrix.platform == 'windows-latest' && vars.ENABLE_WINDOWS_SIGNING == 'true'
        shell: bash
        env:
          THUMBPRINT: ${{ secrets.WINDOWS_CERTIFICATE_THUMBPRINT }}
        run: |
          jq --arg t "$THUMBPRINT" \
            '.bundle.windows = {
              "certificateThumbprint": $t,
              "digestAlgorithm": "sha256",
              "timestampUrl": "http://timestamp.digicert.com"
            }' \
            src-tauri/tauri.conf.json > tauri.conf.tmp
          mv tauri.conf.tmp src-tauri/tauri.conf.json

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ needs.resolve-version.outputs.tag }}
          releaseName: Padora v__VERSION__
          releaseBody: |
            ## Padora v__VERSION__

            Cross-platform Markdown editor (Typora-like).

            | Platform | File |
            | --- | --- |
            | Windows | `.msi` / `.exe` (NSIS) |
            | macOS (Apple Silicon) | `.dmg` (aarch64) |
            | macOS (Intel) | `.dmg` (x86_64) |
            | Linux | `.deb`, `.AppImage` |

            ### Windows install note

            Preview builds are **not code-signed**. If SmartScreen warns the file is unsafe:
            1. Right-click the installer → **Properties** → check **Unblock**
            2. Run again → **More info** → **Run anyway**

            Prefer the **`.msi`** installer when available. See [README](https://github.com/xichenx/Padora/blob/main/README.zh-CN.md#windows-安装说明) for details (中文).
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
