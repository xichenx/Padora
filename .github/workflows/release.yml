# Build Padora for Windows / macOS / Linux and publish installable artifacts
# to a GitHub Release.
#
# Version is determined as follows:
#   • Push tag v*     → version from the tag (e.g. v0.2.0 → 0.2.0)
#   • Manual run      → version from the "Release version" input field
#
# Repo settings (required once):
#   Settings → Actions → General → Workflow permissions → Read and write permissions

name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (semver, without v prefix, e.g. 0.2.0)"
        required: true
        type: string
  push:
    tags:
      - "v*"

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set.outputs.version }}
      tag: ${{ steps.set.outputs.tag }}
    steps:
      - name: Resolve release version
        id: set
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            # refs/tags/v0.2.0 → 0.2.0
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi

          # Trim whitespace and strip a leading "v" if present.
          VERSION="$(echo "$VERSION" | tr -d '[:space:]')"
          VERSION="${VERSION#v}"

          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'; then
            echo "::error::Invalid version: $VERSION (expected semver like 0.2.0)"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Release version: $VERSION (tag: v$VERSION)"

  publish:
    needs: resolve-version
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Apply release version to project files
        shell: bash
        run: |
          VERSION="${{ needs.resolve-version.outputs.version }}"
          jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json > tauri.conf.tmp
          mv tauri.conf.tmp src-tauri/tauri.conf.json
          jq --arg v "$VERSION" '.version = $v' package.json > package.tmp
          mv package.tmp package.json
          echo "Building Padora v$VERSION"

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ needs.resolve-version.outputs.tag }}
          releaseName: Padora v__VERSION__
          releaseBody: |
            ## Padora v__VERSION__

            Cross-platform Markdown editor (Typora-like).

            | Platform | File |
            | --- | --- |
            | Windows | `.msi` / `.exe` (NSIS) |
            | macOS (Apple Silicon) | `.dmg` (aarch64) |
            | macOS (Intel) | `.dmg` (x86_64) |
            | Linux | `.deb`, `.AppImage` |

            Download the installer for your system from the assets below.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
